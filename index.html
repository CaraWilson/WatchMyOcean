<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Watch - Chl Focus</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        
        #erddap-widget { 
            background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; 
            max-width: 1200px; margin: 0 auto 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; flex-wrap: nowrap; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        .map-container { position: relative; width: 100%; display: inline-block; overflow: hidden; }
        .card img { width: 100%; height: auto; border: 1px solid #eee; background-color: #fafafa; display: block; }
        
        /* The SVG now uses a calc to stop exactly before the legend */
        .station-overlay { 
            position: absolute; 
            top: 25px; /* Skip ERDDAP header */
            left: 7.5%; /* Adjust for Lat labels */
            width: 90%; 
            height: calc(100% - 125px); /* This specifically cuts out the legend bar */
            pointer-events: none; 
        }

        .card h3 { margin: 10px 0 5px; font-size: 1.1em; color: #34495e; }
        .card a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
        <button class="update-btn" onclick="updateAllMaps()">Update All Maps</button>
    </div>
</div>

<div class="data-grid">
    <div class="card">
        <h3>Daily Chlorophyll</h3>
        <div class="map-container">
            <img id="img-daily-chla">
            <svg id="ovl-daily" class="station-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
        </div>
        <p><a id="lnk-daily-chla" target="_blank">Modify Map</a></p>
    </div>

    <div class="card">
        <h3>Weekly Chlorophyll</h3>
        <div class="map-container">
            <img id="img-weekly-chla">
            <svg id="ovl-weekly" class="station-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
        </div>
        <p><a id="lnk-weekly-chla" target="_blank">Modify Map</a></p>
    </div>

    <div class="card"><h3>SST</h3><img id="img-sst"><p><a id="lnk-sst" target="_blank">Modify Map</a></p></div>
    <div class="card"><h3>SST Anomaly</h3><img id="img-sst-anom"><p><a id="lnk-sst-anom" target="_blank">Modify Map</a></p></div>
    <div class="card"><h3>Sardine Habitat</h3><img id="img-sardine"><p><a id="lnk-sardine" target="_blank">Modify Map</a></p></div>
    <div class="card"><h3>C-HARMS (PN)</h3><img id="img-charms"><p><a id="lnk-charms" target="_blank">Modify Map</a></p></div>
    <div class="card"><h3>C-HARMS (Salinity)</h3><img id="img-charms-salt"><p><a id="lnk-charms-salt" target="_blank">Modify Map</a></p></div>
    <div class="card"><h3>SSH</h3><img id="img-ssh"><p><a id="lnk-ssh" target="_blank">Modify Map</a></p></div>
    <div class="card"><h3>Wind Speed</h3><img id="img-wind"><p><a id="lnk-wind" target="_blank">Modify Map</a></p></div>
    <div class="card"><h3>Salinity (SMOS)</h3><img id="img-sss"><p><a id="lnk-sss" target="_blank">Modify Map</a></p></div>
</div>

<script>
const stations = [
    {lat: 32.95637, lon: -117.30538}, {lat: 32.94905, lon: -117.27357}, {lat: 33.24350, lon: -117.46542},
    {lat: 32.91304, lon: -117.39438}, {lat: 32.84637, lon: -117.53122}, {lat: 32.67971, lon: -117.87286},
    {lat: 32.51304, lon: -118.21386}, {lat: 32.34637, lon: -118.55423}, {lat: 32.17971, lon: -118.89396},
    {lat: 32.01304, lon: -119.23306}, {lat: 31.84637, lon: -119.57154}, {lat: 31.51304, lon: -120.24666},
    {lat: 32.08462, lon: -120.63872}, {lat: 32.41795, lon: -119.95935}, {lat: 32.65128, lon: -119.48228},
    {lat: 32.91795, lon: -118.93551}, {lat: 33.18462, lon: -118.38708}, {lat: 33.25128, lon: -118.24971},
    {lat: 33.41795, lon: -117.90582}, {lat: 33.48462, lon: -117.76808}, {lat: 33.49462, lon: -117.74741},
    {lat: 33.88953, lon: -118.49033}, {lat: 33.82286, lon: -118.62873}, {lat: 34.02136, lon: -118.83413},
    {lat: 33.65619, lon: -118.97425}, {lat: 33.48953, lon: -119.31910}, {lat: 33.32286, lon: -119.66327},
    {lat: 33.15619, lon: -120.00678}, {lat: 32.98953, lon: -120.34964}, {lat: 32.65619, lon: -121.03339}
];

function drawStations() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);

    const svgs = [document.getElementById('ovl-daily'), document.getElementById('ovl-weekly')];
    
    svgs.forEach(svg => {
        svg.innerHTML = ''; 
        stations.forEach(st => {
            const x = ((st.lon - wLon) / (eLon - wLon)) * 100;
            const y = 100 - (((st.lat - sLat) / (nLat - sLat)) * 100);
            
            if (x >= 0 && x <= 100 && y >= 0 && y <= 100) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x); circle.setAttribute("cy", y);
                circle.setAttribute("r", "1.2"); circle.setAttribute("fill", "#ffff00");
                circle.setAttribute("stroke", "black"); circle.setAttribute("stroke-width", "0.4");
                svg.appendChild(circle);
            }
        });
    });
}

function updateAllMaps() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);

    const coords = `[(${sLat}):(${nLat})][(${wLon}):(${eLon})]`;
    const clamp = (val, min, max) => Math.max(min, Math.min(max, val));
    const chCoords = `[(${clamp(sLat, 31.3, 43)}):(${clamp(nLat, 31.3, 43)})][(${clamp(wLon, -127.5, -117)}):(${clamp(eLon, -127.5, -117)})]`;

    function setContent(id, baseUrl, params) {
        document.getElementById('img-' + id).src = baseUrl + ".png" + params + "&.draw=img";
        document.getElementById('lnk-' + id).href = baseUrl + ".graph" + params;
    }

    setContent('daily-chla', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily', `?chlor_a[(last)][(0.0)]${coords}&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`);
    setContent('weekly-chla', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly', `?chlor_a[(last)][(0.0)]${coords}&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`);
    setContent('sst', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', `?CRW_SST[(last)]${coords}&.vars=longitude|latitude|CRW_SST&.colorBar=|||10|22|`);
    setContent('sst-anom', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', `?CRW_SSTANOMALY[(last)]${coords}&.vars=longitude|latitude|CRW_SSTANOMALY&.colorBar=BlueWhiteRed|||-2|2|`);
    setContent('ssh', 'https://coastwatch.noaa.gov/erddap/griddap/noaacweddymesiplusdaily', `?ssh[(last)]${coords}&.vars=longitude|latitude|ssh`);
    setContent('wind', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day', `?wind_speed[(last)][(10.0)]${coords}&.vars=longitude|latitude|wind_speed`);
    setContent('sardine', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/sardine_habitat_viirs_v2', `?potential_habitat_classification[(last)]${coords}`);
    setContent('sss', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/coastwatchSMOSv662SSS3day', `?sss[(last)][(0.0)]${coords}`);
    setContent('charms', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', `?pseudo_nitzschia[(last)]${chCoords}`);
    setContent('charms-salt', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', `?salinity[(last)]${chCoords}&.colorBar=|||31|35|`);

    drawStations();
}
window.onload = updateAllMaps;
</script>
</body>
</html>
