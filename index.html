<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI - True Transparent Overlay</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        
        #controls { 
            background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; 
            max-width: 1000px; margin: 0 auto 30px auto; 
            display: flex; align-items: flex-end; justify-content: space-between; gap: 10px;
        }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        
        /* The Stack */
        .map-stack { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background: #000; /* Contrast background */
            border: 1px solid #333;
        }
        .base-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .station-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        .legend-box { margin-top: 10px; }
        .legend-box img { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>

<div id="controls">
    <div class="input-group"><label>S Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
    <div class="input-group"><label>N Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
    <div class="input-group"><label>W Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
    <div class="input-group"><label>E Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
    <button class="update-btn" onclick="updateDashboard()">Update View</button>
</div>

<div class="data-grid">
    <div class="card">
        <h3>Daily Chlorophyll + Stations</h3>
        <div class="map-stack">
            <img id="img-chla-base" class="base-layer">
            <img id="img-chla-stns" class="station-layer">
        </div>
        <div class="legend-box"><img id="leg-chla"></div>
    </div>
</div>

<script>
function updateDashboard() {
    const sLat = document.getElementById('latMin').value;
    const nLat = document.getElementById('latMax').value;
    const wLon = document.getElementById('lonMin').value;
    const eLon = document.getElementById('lonMax').value;

    const coords = `[(${sLat}):(${nLat})][(${wLon}):(${eLon})]`;
    const alignment = `&.latMin=${sLat}&.latMax=${nLat}&.lonMin=${wLon}&.lonMax=${eLon}`;

    // 1. Satellite Base
    document.getElementById('img-chla-base').src = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png?chlor_a[(last)][(0.0)]${coords}&.draw=surface&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`;

    // 2. Station Overlay: KEY FIX
    // We set bgcolor=0x808080 and transparent=true. 
    // This tells ERDDAP's renderer to key out the base map (land/bathymetry) entirely.
    const stnUrl = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/erdCalCOFIstns.png?longitude,latitude&cruise=%22202304%22&line>84&station<=70` +
                   `&.draw=surface&bgcolor=0x808080&transparent=true` +
                   `&.markerType=circle&.markerSize=6&.markerColor=0xFFFF00&.markerOutlineColor=0x000000` + 
                   alignment;

    document.getElementById('img-chla-stns').src = stnUrl;
    document.getElementById('leg-chla').src = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png?chlor_a[(last)][(0.0)]${coords}&.draw=legend&.colorBar=Rainbow2|||.03|5|`;
}

window.onload = updateDashboard;
</script>
</body>
</html>
