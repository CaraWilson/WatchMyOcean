<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Precision Overlay</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; }
        #erddap-widget { 
            background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; 
            max-width: 1200px; margin: 0 auto 30px auto; 
        }
        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        /* The Magic Stack */
        .map-stack { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #eee; overflow: hidden; border: 1px solid #ccc; }
        .layer-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .layer-stations { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        .card h3 { margin: 10px 0; color: #34495e; }
        .card p { font-size: 0.8em; color: #7f8c8d; }
    </style>
</head>
<body>

<h1>CalCOFI Chlorophyll Overlays</h1>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
        <button class="update-btn" onclick="updateMaps()">Update Overlay</button>
    </div>
</div>

<div class="data-grid">
    <div class="card">
        <h3>Daily Chlorophyll + Stations</h3>
        <div class="map-stack">
            <img id="img-chla-base" class="layer-base">
            <img id="img-chla-stns" class="layer-stations">
        </div>
        <p>Layered via .draw=surface</p>
    </div>

    <div class="card">
        <h3>Weekly Chlorophyll + Stations</h3>
        <div class="map-stack">
            <img id="img-weekly-base" class="layer-base">
            <img id="img-weekly-stns" class="layer-stations">
        </div>
        <p>Layered via .draw=surface</p>
    </div>
</div>

<script>
function updateMaps() {
    const sLat = document.getElementById('latMin').value;
    const nLat = document.getElementById('latMax').value;
    const wLon = document.getElementById('lonMin').value;
    const eLon = document.getElementById('lonMax').value;

    const bounds = `[(${sLat}):(${nLat})][(${wLon}):(${eLon})]`;
    
    // 1. Generate the Satellite Base (Surface only = No Legend)
    const dailyBase = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png?chlor_a[(last)][(0.0)]${bounds}&.draw=surface&.colorBar=Rainbow2|||.03|5|`;
    const weeklyBase = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly.png?chlor_a[(last)][(0.0)]${bounds}&.draw=surface&.colorBar=Rainbow2|||.03|5|`;

    // 2. Generate the Transparent Station Map (Surface only = No Legend)
    // We use markerType=square and markerSize=5 for visibility
    const stnOverlay = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/erdCalCOFIstns.png?longitude,latitude&cruise=%22202304%22&line>84&station<=70&.draw=surface&.markerType=square&.markerSize=5&.markerColor=0x000000&.latMin=${sLat}&.latMax=${nLat}&.lonMin=${wLon}&.lonMax=${eLon}`;

    document.getElementById('img-chla-base').src = dailyBase;
    document.getElementById('img-chla-stns').src = stnOverlay;
    
    document.getElementById('img-weekly-base').src = weeklyBase;
    document.getElementById('img-weekly-stns').src = stnOverlay;
}

window.onload = updateMaps;
</script>
</body>
</html>
