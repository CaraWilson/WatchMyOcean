<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI - KML Geo-Aligned Overlay</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; }
        #controls { background: white; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; max-width: 1000px; margin: 0 auto 20px auto; display: flex; gap: 10px; align-items: flex-end; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.7em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .map-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 900px; margin: 0 auto; }
        #map { height: 600px; width: 100%; background: #001529; }
    </style>
</head>
<body>

<h1>CalCOFI KML Precision Overlay</h1>

<div id="controls">
    <div class="input-group"><label>S Lat</label><input type="number" id="latMin" value="29"></div>
    <div class="input-group"><label>N Lat</label><input type="number" id="latMax" value="39"></div>
    <div class="input-group"><label>W Lon</label><input type="number" id="lonMin" value="-127"></div>
    <div class="input-group"><label>E Lon</label><input type="number" id="lonMax" value="-116"></div>
    <button class="update-btn" onclick="updateMap()">Update Precision View</button>
</div>

<div class="map-card">
    <div id="map"></div>
</div>

<script>
// Cruise 202304 Stations
const stations = [
    {lat: 34.448, lon: -120.518}, {lat: 34.315, lon: -120.789}, {lat: 34.148, lon: -121.127}, 
    {lat: 33.982, lon: -121.464}, {lat: 33.815, lon: -121.802}, {lat: 33.648, lon: -122.138},
    {lat: 33.315, lon: -122.812}, {lat: 33.945, lon: -118.412}, {lat: 33.845, lon: -118.615}, 
    {lat: 33.745, lon: -118.818}, {lat: 33.578, lon: -119.156}, {lat: 33.478, lon: -119.358},
    {lat: 33.245, lon: -119.830}, {lat: 33.078, lon: -120.168}, {lat: 32.745, lon: -120.842}, 
    {lat: 32.952, lon: -117.318}, {lat: 32.902, lon: -117.418}, {lat: 32.835, lon: -117.554}, 
    {lat: 32.735, lon: -117.757}, {lat: 32.568, lon: -118.094}, {lat: 32.402, lon: -118.431}, 
    {lat: 32.068, lon: -119.105}, {lat: 31.735, lon: -119.778}
];

const map = L.map('map', { crs: L.CRS.EPSG4326, attributionControl: false });
let satelliteLayer, stationLayer;

function updateMap() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);
    const bounds = [[sLat, wLon], [nLat, eLon]];

    if (satelliteLayer) map.removeLayer(satelliteLayer);
    if (stationLayer) map.removeLayer(stationLayer);

    // KML Logic: We use the .png endpoint but with the 'surface' draw 
    // to mimic what the KML GroundOverlay would reference.
    const imgUrl = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png?chlor_a[(last)][(0.0)][(${sLat}):(${nLat})][(${wLon}):(${eLon})]&.draw=surface&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`;

    satelliteLayer = L.imageOverlay(imgUrl, bounds).addTo(map);

    stationLayer = L.layerGroup();
    stations.forEach(st => {
        L.circleMarker([st.lat, st.lon], {
            radius: 4, fillColor: "yellow", color: "#000", weight: 1, fillOpacity: 1
        }).addTo(stationLayer);
    });
    stationLayer.addTo(map);

    map.fitBounds(bounds);
}

window.onload = updateMap;
</script>
</body>
</html>
