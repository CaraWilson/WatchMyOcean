<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Satellite Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        #erddap-widget { 
            background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; 
            max-width: 1200px; margin: 0 auto 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .button-group { display: flex; gap: 8px; flex: 0.5; }
        .update-btn { flex: 2; background: #2c3e50; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .reset-btn { flex: 1; background: #95a5a6; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        /* The "Clean" Container */
        .map-container { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #001529; overflow: hidden; border: 1px solid #333; }
        .card img.map-img { width: 100%; height: 100%; object-fit: fill; display: block; }
        
        /* The SVG now fills the entire clean map 1:1 */
        .station-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        .legend-box { margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; min-height: 50px; }
        .legend-box img { max-width: 100%; height: auto; }
        .card h3 { margin: 5px 0; font-size: 1.1em; color: #34495e; }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
        <div class="button-group">
            <button class="update-btn" onclick="updateAllMaps()">Update</button>
            <button class="reset-btn" onclick="resetDefaults()">Reset</button>
        </div>
    </div>
</div>

<div class="data-grid" id="grid">
    <div class="card"><h3>Daily Chlorophyll</h3><div class="map-container"><img id="img-chla" class="map-img"><svg id="svg-chla" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><div class="legend-box"><img id="leg-chla"></div></div>
    <div class="card"><h3>SST (10-22°C)</h3><div class="map-container"><img id="img-sst" class="map-img"><svg id="svg-sst" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><div class="legend-box"><img id="leg-sst"></div></div>
    <div class="card"><h3>SSH (±0.5m)</h3><div class="map-container"><img id="img-ssh" class="map-img"><svg id="svg-ssh" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><div class="legend-box"><img id="leg-ssh"></div></div>
    <div class="card"><h3>C-HARMS (PN)</h3><div class="map-container"><img id="img-charms" class="map-img"><svg id="svg-charms" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><div class="legend-box"><img id="leg-charms"></div></div>
</div>

<script>
const stations = [
    {lat: 34.448, lon: -120.518}, {lat: 34.315, lon: -120.789}, {lat: 34.148, lon: -121.127}, 
    {lat: 33.982, lon: -121.464}, {lat: 33.815, lon: -121.802}, {lat: 33.648, lon: -122.138},
    {lat: 33.315, lon: -122.812}, {lat: 33.945, lon: -118.412}, {lat: 33.845, lon: -118.615}, 
    {lat: 33.745, lon: -118.818}, {lat: 33.578, lon: -119.156}, {lat: 33.478, lon: -119.358},
    {lat: 33.245, lon: -119.830}, {lat: 33.078, lon: -120.168}, {lat: 32.745, lon: -120.842}, 
    {lat: 32.952, lon: -117.318}, {lat: 32.902, lon: -117.418}, {lat: 32.835, lon: -117.554}, 
    {lat: 32.735, lon: -117.757}, {lat: 32.568, lon: -118.094}, {lat: 32.402, lon: -118.431}, 
    {lat: 32.068, lon: -119.105}, {lat: 31.735, lon: -119.778}
];

function resetDefaults() {
    document.getElementById('latMin').value = 29;
    document.getElementById('latMax').value = 39;
    document.getElementById('lonMin').value = -127;
    document.getElementById('lonMax').value = -116;
    updateAllMaps();
}

function updateAllMaps() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);

    const coords = `[(${sLat}):(${nLat})][(${wLon}):(${eLon})]`;

    function setMap(id, baseUrl, gridVar, colorBar, isCharms=false) {
        let lMin = sLat, lMax = nLat, oMin = wLon, oMax = eLon;
        if(isCharms) {
            lMin = Math.max(31.3, sLat); lMax = Math.min(43, nLat);
            oMin = Math.max(-127.5, wLon); oMax = Math.min(-117, eLon);
        }

        const currentCoords = `[(${lMin}):(${lMax})][(${oMin}):(${oMax})]`;
        const commonUrl = `${baseUrl}.png?${gridVar}[(last)]${id==='chla'?'[(0.0)]':''}${currentCoords}&.vars=longitude|latitude|${gridVar}&.colorBar=${colorBar}`;
        
        // 1. Image as SURFACE (No margins/legend)
        document.getElementById('img-' + id).src = commonUrl + `&.draw=surface`;
        // 2. Legend as separate image
        document.getElementById('leg-' + id).src = commonUrl + `&.draw=legend`;

        // 3. Draw Stations on 1:1 SVG
        const svg = document.getElementById('svg-' + id);
        svg.innerHTML = '';
        stations.forEach(st => {
            const x = ((st.lon - oMin) / (oMax - oMin)) * 100;
            const y = 100 - (((st.lat - lMin) / (lMax - lMin)) * 100);
            if (x >= 0 && x <= 100 && y >= 0 && y <= 100) {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", "1.5"); c.setAttribute("fill", "yellow");
                c.setAttribute("stroke", "black"); c.setAttribute("stroke-width", "0.5");
                svg.appendChild(c);
            }
        });
    }

    setMap('chla', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily', 'chlor_a', 'Rainbow2|||.03|5|');
    setMap('sst', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', 'CRW_SST', '|||10|22|');
    setMap('ssh', 'https://coastwatch.noaa.gov/erddap/griddap/noaacweddymesiplusdaily', 'ssh', '|||-0.5|0.5|');
    setMap('charms', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', 'pseudo_nitzschia', '', true);
}

window.onload = updateAllMaps;
</script>
</body>
</html>
