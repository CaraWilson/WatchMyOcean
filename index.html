<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Watch - Geographic Alignment</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; }
        #erddap-widget { 
            background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; 
            max-width: 1200px; margin: 0 auto 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .update-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        /* The map height is set; Leaflet will fill this with the satellite image */
        .map-box { height: 450px; width: 100%; background: #fafafa; border: 1px solid #eee; }
        .card h3 { margin: 10px 0; font-size: 1.1em; color: #34495e; }
    </style>
</head>
<body>

<h1>Satellite Monitoring of CalCOFI region</h1>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116"></div>
        <button class="update-btn" onclick="updateAll()">Update Maps</button>
    </div>
</div>

<div class="data-grid" id="grid">
    </div>

<script>
const stations = [
    {lat: 32.95637, lon: -117.30538}, {lat: 32.94905, lon: -117.27357}, {lat: 33.24350, lon: -117.46542},
    {lat: 32.91304, lon: -117.39438}, {lat: 32.84637, lon: -117.53122}, {lat: 32.67971, lon: -117.87286},
    {lat: 32.51304, lon: -118.21386}, {lat: 32.34637, lon: -118.55423}, {lat: 32.17971, lon: -118.89396},
    {lat: 32.01304, lon: -119.23306}, {lat: 31.84637, lon: -119.57154}, {lat: 31.51304, lon: -120.24666},
    {lat: 32.08462, lon: -120.63872}, {lat: 32.41795, lon: -119.95935}, {lat: 32.65128, lon: -119.48228},
    {lat: 32.91795, lon: -118.93551}, {lat: 33.18462, lon: -118.38708}, {lat: 33.25128, lon: -118.24971},
    {lat: 33.41795, lon: -117.90582}, {lat: 33.48462, lon: -117.76808}, {lat: 33.49462, lon: -117.74741},
    {lat: 33.88953, lon: -118.49033}, {lat: 33.82286, lon: -118.62873}, {lat: 34.02136, lon: -118.83413},
    {lat: 33.65619, lon: -118.97425}, {lat: 33.48953, lon: -119.31910}, {lat: 33.32286, lon: -119.66327},
    {lat: 33.15619, lon: -120.00678}, {lat: 32.98953, lon: -120.34964}, {lat: 32.65619, lon: -121.03339}
];

const config = [
    { id: 'daily-chla', title: 'Daily Chlorophyll', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png', var: 'chlor_a', colors: 'Rainbow2|||.03|5|' },
    { id: 'weekly-chla', title: 'Weekly Chlorophyll', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly.png', var: 'chlor_a', colors: 'Rainbow2|||.03|5|' },
    { id: 'sst', title: 'SST', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW.png', var: 'CRW_SST', colors: '|||10|22|' },
    { id: 'sst-anom', title: 'SST Anomaly', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW.png', var: 'CRW_SSTANOMALY', colors: 'BlueWhiteRed|||-2|2|' },
    { id: 'sardine', title: 'Sardine Habitat', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/sardine_habitat_viirs_v2.png', var: 'potential_habitat_classification', colors: '' },
    { id: 'charms', title: 'C-HARMS (PN)', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180.png', var: 'pseudo_nitzschia', colors: '', charms: true },
    { id: 'charms-salt', title: 'C-HARMS (Salinity)', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180.png', var: 'salinity', colors: '|||31|35|', charms: true },
    { id: 'ssh', title: 'SSH', url: 'https://coastwatch.noaa.gov/erddap/griddap/noaacweddymesiplusdaily.png', var: 'ssh', colors: '' },
    { id: 'wind', title: 'Wind Speed', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day.png', var: 'wind_speed', colors: '' },
    { id: 'sss', title: 'Salinity (SMOS)', url: 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/coastwatchSMOSv662SSS3day.png', var: 'sss', colors: '' }
];

const maps = {};

// Create the cards
const grid = document.getElementById('grid');
config.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${c.title}</h3><div id="map-${c.id}" class="map-box"></div>`;
    grid.appendChild(card);
    
    // Initialize Leaflet for this card
    maps[c.id] = L.map(`map-${c.id}`, { attributionControl: false, zoomControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false });
});

function updateAll() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = parseFloat(document.getElementById('lonMax').value);

    config.forEach(c => {
        const m = maps[c.id];
        let curSLat = sLat, curNLat = nLat, curWLon = wLon, curELon = eLon;

        // Apply C-HARMS specific clamping
        if (c.charms) {
            curSLat = Math.max(31.3, sLat); curNLat = Math.min(43, nLat);
            curWLon = Math.max(-127.5, wLon); curELon = Math.min(-117, eLon);
        }

        const bounds = [[curSLat, curWLon], [curNLat, curELon]];
        m.fitBounds(bounds);

        // Remove old layers
        m.eachLayer(layer => m.removeLayer(layer));

        // Add Satellite Image Overlay - This maps it geographically!
        const params = `?${c.var}[(last)]${c.charms ? '' : '[(0.0)]'}[(${curSLat}):(${curNLat})][(${curWLon}):(${curELon})]&.draw=surface&.vars=longitude|latitude|${c.var}&.colorBar=${c.colors}`;
        L.imageOverlay(c.url + params, bounds, { opacity: 1.0 }).addTo(m);

        // Add Stations exactly on their coordinates
        stations.forEach(st => {
            if (st.lat >= curSLat && st.lat <= curNLat && st.lon >= curWLon && st.lon <= curELon) {
                L.circleMarker([st.lat, st.lon], { radius: 3, color: 'black', fillColor: 'yellow', fillOpacity: 1, weight: 1 }).addTo(m);
            }
        });
    });
}

window.onload = updateAll;
</script>
</body>
</html>
