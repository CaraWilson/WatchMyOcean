<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalCOFI Satellite Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        #erddap-widget { 
            background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #2c3e50; 
            max-width: 1200px; margin: 0 auto 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .widget-flex { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; flex-wrap: nowrap; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .button-group { display: flex; gap: 8px; flex: 0.5; }
        .update-btn { flex: 2; background: #2c3e50; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .reset-btn { flex: 1; background: #95a5a6; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        /* THE OVERLAY ENGINE */
        .map-container { position: relative; width: 100%; display: inline-block; }
        .card img { width: 100%; height: auto; border: 1px solid #eee; background-color: #fafafa; display: block; margin-bottom: 10px; }
        
        /* Calibrated to match ERDDAP PNG internal margins */
        .station-svg { 
            position: absolute; 
            top: 5.5%;    /* Skips the top title */
            left: 7.4%;   /* Skips left lat labels */
            width: 89.2%; /* Map width */
            height: 77.2%;/* Map height (skips bottom legend) */
            pointer-events: none; 
        }

        .card h3 { margin: 10px 0 5px; font-size: 1.1em; color: #34495e; }
        .card a { color: #3498db; text-decoration: none; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<h1>CalCOFI Satellite Monitoring</h1>

<div id="erddap-widget">
    <div class="widget-flex">
        <div class="input-group"><label>South Lat</label><input type="number" id="latMin" value="29" step="0.1"></div>
        <div class="input-group"><label>North Lat</label><input type="number" id="latMax" value="39" step="0.1"></div>
        <div class="input-group"><label>West Lon</label><input type="number" id="lonMin" value="-127" step="0.1"></div>
        <div class="input-group"><label>East Lon</label><input type="number" id="lonMax" value="-116" step="0.1"></div>
        <div class="button-group">
            <button class="update-btn" onclick="updateAllMaps()">Update</button>
            <button class="reset-btn" onclick="resetDefaults()">Reset</button>
        </div>
    </div>
</div>

<div class="data-grid" id="grid">
    <div class="card"><h3>Daily Chlorophyll</h3><div class="map-container"><img id="img-chla-d"><svg id="svg-chla-d" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-chla-d" target="_blank">View on ERDDAP</a></div>
    <div class="card"><h3>Weekly Chlorophyll</h3><div class="map-container"><img id="img-chla-w"><svg id="svg-chla-w" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-chla-w" target="_blank">View on ERDDAP</a></div>
    <div class="card"><h3>SST (10-22°C)</h3><div class="map-container"><img id="img-sst"><svg id="svg-sst" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-sst" target="_blank">View on ERDDAP</a></div>
    <div class="card"><h3>SST Anomaly</h3><div class="map-container"><img id="img-sst-anom"><svg id="svg-sst-anom" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-sst-anom" target="_blank">View on ERDDAP</a></div>
    <div class="card"><h3>C-HARMS (PN)</h3><div class="map-container"><img id="img-charms-pn"><svg id="svg-charms-pn" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-charms-pn" target="_blank">View on ERDDAP</a></div>
    <div class="card"><h3>C-HARMS (Salinity)</h3><div class="map-container"><img id="img-charms-salt"><svg id="svg-charms-salt" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-charms-salt" target="_blank">View on ERDDAP</a></div>
    <div class="card"><h3>Wind Speed</h3><div class="map-container"><img id="img-wind"><svg id="svg-wind" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-wind" target="_blank">View on ERDDAP</a></div>
    <div class="card"><h3>SSH</h3><div class="map-container"><img id="img-ssh"><svg id="svg-ssh" class="station-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><a id="lnk-ssh" target="_blank">View on ERDDAP</a></div>
</div>

<script>
// Static Station Data (Cruise 202304)
const stations = [
    {lat: 34.448, lon: -120.518}, {lat: 34.315, lon: -120.789}, {lat: 34.148, lon: -121.127}, 
    {lat: 33.982, lon: -121.464}, {lat: 33.815, lon: -121.802}, {lat: 33.648, lon: -122.138},
    {lat: 33.315, lon: -122.812}, {lat: 33.945, lon: -118.412}, {lat: 33.845, lon: -118.615}, 
    {lat: 33.745, lon: -118.818}, {lat: 33.578, lon: -119.156}, {lat: 33.478, lon: -119.358},
    {lat: 33.245, lon: -119.830}, {lat: 33.078, lon: -120.168}, {lat: 32.745, lon: -120.842}, 
    {lat: 32.952, lon: -117.318}, {lat: 32.902, lon: -117.418}, {lat: 32.835, lon: -117.554}, 
    {lat: 32.735, lon: -117.757}, {lat: 32.568, lon: -118.094}, {lat: 32.402, lon: -118.431}, 
    {lat: 32.068, lon: -119.105}, {lat: 31.735, lon: -119.778}
];

function resetDefaults() {
    document.getElementById('latMin').value = 29;
    document.getElementById('latMax').value = 39;
    document.getElementById('lonMin').value = -127;
    document.getElementById('lonMax').value = -116;
    updateAllMaps();
}

function updateAllMaps() {
    const sLat = parseFloat(document.getElementById('latMin').value);
    const nLat = parseFloat(document.getElementById('latMax').value);
    const wLon = parseFloat(document.getElementById('lonMin').value);
    const eLon = document.getElementById('lonMax').value; // Keep as string for URL
    const floatELon = parseFloat(eLon);

    const clamp = (val, min, max) => Math.max(min, Math.min(max, val));
    const coords = `[(${sLat}):(${nLat})][(${wLon}):(${eLon})]`;
    
    // C-HARMS Specific Bounds
    const cSLat = clamp(sLat, 31.3, 43), cNLat = clamp(nLat, 31.3, 43);
    const cWLon = clamp(wLon, -127.5, -117), cELon = clamp(floatELon, -127.5, -117);
    const charmsCoords = `[(${cSLat}):(${cNLat})][(${cWLon}):(${cELon})]`;

    function setContent(id, baseUrl, gridPart, isCharms=false) {
        document.getElementById('img-' + id).src = baseUrl + ".png" + gridPart;
        document.getElementById('lnk-' + id).href = baseUrl + ".graph" + gridPart;
        
        // Draw Overlay
        const svg = document.getElementById('svg-' + id);
        if(!svg) return;
        svg.innerHTML = '';
        
        const curSLat = isCharms ? cSLat : sLat;
        const curNLat = isCharms ? cNLat : nLat;
        const curWLon = isCharms ? cWLon : wLon;
        const curELon = isCharms ? cELon : floatELon;

        stations.forEach(st => {
            const x = ((st.lon - curWLon) / (curELon - curWLon)) * 100;
            const y = 100 - (((st.lat - curSLat) / (curNLat - curSLat)) * 100);
            
            if (x >= 0 && x <= 100 && y >= 0 && y <= 100) {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", y);
                c.setAttribute("r", "1.5"); c.setAttribute("fill", "yellow");
                c.setAttribute("stroke", "black"); c.setAttribute("stroke-width", "0.5");
                svg.appendChild(c);
            }
        });
    }

    setContent('chla-d', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily', `?chlor_a[(last)][(0.0)]${coords}&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`);
    setContent('chla-w', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly', `?chlor_a[(last)][(0.0)]${coords}&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`);
    setContent('sst', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', `?CRW_SST[(last)]${coords}&.vars=longitude|latitude|CRW_SST&.colorBar=|||10|22|`);
    setContent('sst-anom', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW', `?CRW_SSTANOMALY[(last)]${coords}&.vars=longitude|latitude|CRW_SSTANOMALY&.colorBar=BlueWhiteRed|||-2|2|`);
    setContent('wind', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day', `?wind_speed[(last)][(10.0)]${coords}`);
    setContent('charms-pn', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', `?pseudo_nitzschia[(last)]${charmsCoords}`, true);
    setContent('charms-salt', 'https://coastwatch.pfeg.noaa.gov/erddap/griddap/wvcharmV3_3day_LonPM180', `?salinity[(last)]${charmsCoords}&.colorBar=|||31|35|`, true);
    setContent('ssh', 'https://coastwatch.noaa.gov/erddap/griddap/noaacweddymesiplusdaily', `?ssh[(last)]${coords}&.vars=longitude|latitude|ssh&.colorBar=|||-0.5|0.5|`);
}

window.onload = updateAllMaps;
</script>
</body>
</html>
