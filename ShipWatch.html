<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOAA Ship Track & Chlorophyll Mapper</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f4f4f9; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 2px solid #003366; margin-bottom: 20px; cursor: pointer; }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .map-box { min-height: 450px; border: 2px solid #eee; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; position: relative; }
        h3 { color: #003366; margin-bottom: 10px; font-size: 1rem; text-align: center; }
        img { max-width: 100%; height: auto; display: block; border-radius: 4px; }
        .info { margin-top: 15px; color: #333; text-align: center; line-height: 1.6; font-size: 1.1rem; word-wrap: break-word; }
        .coords-text { font-weight: bold; color: #003366; }
        .placeholder { color: #666; padding: 20px; text-align: center; }
        .url-debug { font-size: 0.8rem; color: #d35400; margin-top: 10px; display: block; border-top: 1px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Vessel History & Environmental Context</h2>
    <select id="vessel-selector" onchange="loadShipMap()">
        <option value="fsuNoaaShipWTEPnrt">Oscar Dyson (Gulf of Alaska)</option>
        <option value="fsuNoaaShipWTEDnrt">Bell M. Shimada (West Coast)</option>
        <option value="fsuNoaaShipWTEFnrt">Rainier (West Coast)</option>
        <option value="fsuNoaaShipWTEEnrt">Elton Sette (Hawaii)</option>
        <option value="fsuNoaaShipWTERnrt">Nancy Foster (Atlantic)</option>
        <option value="fsuNoaaShipWTDLnrt">Pisces (Gulf of Mexico)</option>
    </select>

    <div class="map-grid">
        <div class="map-box">
            <h3>10-Day Vessel Track</h3>
            <div id="track-placeholder" class="placeholder">Loading track...</div>
            <img id="dynamic-map" src="" style="display:none;">
        </div>
        <div class="map-box">
            <h3>Chlorophyll-a (Weekly 5°x5° Box)</h3>
            <div id="chlor-placeholder" class="placeholder">Waiting for coordinates...</div>
            <img id="chlor-map" src="" style="display:none;">
        </div>
    </div>

    <div id="ship-info" class="info"></div>
</div>

<script>
    let currentShipName = "";

    function handleLatestShipPosition(data) {
        const info = document.getElementById("ship-info");
        const chlorImg = document.getElementById("chlor-map");
        const chlorPlaceholder = document.getElementById("chlor-placeholder");

        try {
            const row = data.table.rows[0];
            const time = row[0];
            const lat = Number(row[1]);
            const lon = Number(row[2]);
            const lonForMap = lon > 180 ? lon - 360 : lon;

            if (Number.isNaN(lat) || Number.isNaN(lon)) throw new Error("Invalid coordinates");

            const dateObj = new Date(time);
            const timeWithZone = dateObj.toLocaleString(undefined, {
                year: 'numeric', month: 'numeric', day: 'numeric',
                hour: 'numeric', minute: 'numeric', second: 'numeric',
                timeZoneName: 'short'
            });

            // Calculate Bounding Box
            const minLat = (lat - 2.5).toFixed(2);
            const maxLat = (lat + 2.5).toFixed(2);
            const minLon = (lonForMap - 2.5).toFixed(2);
            const maxLon = (lonForMap + 2.5).toFixed(2);

            // Construct the URL
            const chlorUrl = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly.png?chlor_a%5B(latest)%5D%5B(0.0)%5D%5B(${maxLat}):(${minLat})%5D%5B(${minLon}):(${maxLon})%5D&.draw=surface&.vars=longitude%7Clatitude%7Cchlor_a&.colorBar=Rainbow2%7C%7C%7C.03%7C5%7C&.bgColor=0xffccccff`;
            
            // UI Update
            info.innerHTML =
                `Vessel: <b>${currentShipName}</b><br>` +
                `Latest Position: <span class="coords-text">${lat.toFixed(2)}, ${lon.toFixed(2)} (${lonForMap.toFixed(2)})</span> ` +
                `Observed: ${timeWithZone}` +
                `<div class="url-debug"><b>Diagnostic Chl URL:</b> <a href="${chlorUrl}" target="_blank">${chlorUrl}</a></div>`;

            chlorPlaceholder.innerText = "Requesting Chlorophyll data...";
            chlorImg.src = chlorUrl;
            
            chlorImg.onload = () => {
                chlorPlaceholder.style.display = "none";
                chlorImg.style.display = "block";
            };
            chlorImg.onerror = () => {
                chlorPlaceholder.innerText = "Chlorophyll map failed to load. Click the diagnostic link below to see the error.";
            };

        } catch (e) {
            info.innerHTML = `Vessel: <b>${currentShipName}</b><br><small>(Coordinates temporarily unavailable)</small>`;
        }
    }

    function loadShipMap() {
        const selector = document.getElementById("vessel-selector");
        const shipId = selector.value;
        const shipName = selector.options[selector.selectedIndex].text.replace(/\s*\(.*?\)\s*/g, "").trim();

        currentShipName = shipName;
        const mapImg = document.getElementById("dynamic-map");
        const trackPlaceholder = document.getElementById("track-placeholder");
        const chlorImg = document.getElementById("chlor-map");
        const chlorPlaceholder = document.getElementById("chlor-placeholder");
        const info = document.getElementById("ship-info");

        if (!shipId) return;

        info.innerHTML = `Vessel: <b>${shipName}</b><br><small>Fetching current status...</small>`;
        trackPlaceholder.style.display = "block";
        mapImg.style.display = "none";
        chlorImg.style.display = "none";
        chlorPlaceholder.style.display = "block";
        chlorPlaceholder.innerText = "Calculating bounding box...";

        const date = new Date();
        date.setDate(date.getDate() - 10);
        const dateString = date.toISOString().split("T")[0];

        mapImg.src = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.png?longitude%2Clatitude%2Ctime&time%3E=${dateString}&.draw=markers&.marker=10%7C5&.color=0x000000&.colorBar=%7C%7C%7C%7C%7C&.bgColor=0xffccccff`;

        mapImg.onload = () => {
            trackPlaceholder.style.display = "none";
            mapImg.style.display = "block";
        };

        const oldScript = document.getElementById("jsonp-script");
        if (oldScript) oldScript.remove();

        const script = document.createElement("script");
        script.id = "jsonp-script";
        script.src = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.json?time,latitude,longitude&orderByMax("time")&.jsonp=handleLatestShipPosition`;
        document.body.appendChild(script);
    }

    window.onload = loadShipMap;
</script>
</body>
</html>
