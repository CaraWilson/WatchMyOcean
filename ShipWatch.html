<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOAA Fleet Environmental Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 2px solid #003366; margin-bottom: 20px; }
        
        /* Dashboard Layout */
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .map-box { background: #fafafa; border: 1px solid #ddd; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px; position: relative; }
        .map-box h3 { margin: 5px 0; font-size: 0.9rem; color: #003366; text-transform: uppercase; }
        
        img { max-width: 100%; height: auto; border-radius: 4px; display: none; }
        .placeholder { color: #888; font-size: 0.8rem; text-align: center; }
        
        .info { margin-top: 20px; padding: 15px; background: #eef2f7; border-radius: 8px; text-align: center; line-height: 1.6; }
        .coords-text { font-weight: bold; color: #003366; }
        .url-debug { font-size: 0.75rem; color: #777; margin-top: 5px; word-break: break-all; }
        
        /* Responsive: stack on small screens */
        @media (max-width: 1000px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 600px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Vessel & Environmental Context</h2>
    
    <select id="vessel-selector" onchange="loadShipMap()">
        <option value="fsuNoaaShipWTEPnrt">Oscar Dyson (Gulf of Alaska)</option>
        <option value="fsuNoaaShipWTEDnrt">Bell M. Shimada (West Coast)</option>
        <option value="fsuNoaaShipWTEFnrt">Rainier (West Coast)</option>
        <option value="fsuNoaaShipWTEEnrt">Elton Sette (Hawaii)</option>
        <option value="fsuNoaaShipWTERnrt">Nancy Foster (Atlantic)</option>
        <option value="fsuNoaaShipWTDLnrt">Pisces (Gulf of Mexico)</option>
    </select>

    <div class="dashboard-grid">
        <div class="map-box"><h3>10-Day Track</h3><div class="placeholder">Loading...</div><img id="track-map"></div>
        <div class="map-box"><h3>Chlorophyll (Daily)</h3><div class="placeholder">Waiting...</div><img id="chla-d"></div>
        <div class="map-box"><h3>Chlorophyll (Weekly)</h3><div class="placeholder">Waiting...</div><img id="chla-w"></div>
        
        <div class="map-box"><h3>SST</h3><div class="placeholder">Waiting...</div><img id="sst"></div>
        <div class="map-box"><h3>SST Anomaly</h3><div class="placeholder">Waiting...</div><img id="sst-anom"></div>
        <div class="map-box"><h3>Winds (1-Day)</h3><div class="placeholder">Waiting...</div><img id="wind"></div>
        
        <div class="map-box" style="grid-column: span 3;"><h3>Sea Surface Height (SSH)</h3><div class="placeholder">Waiting...</div><img id="ssh"></div>
    </div>

    <div id="ship-info" class="info"></div>
</div>

<script>
    let currentShipName = "";

    function updateMap(id, url) {
        const img = document.getElementById(id);
        const box = img.parentElement;
        const placeholder = box.querySelector('.placeholder');
        
        img.style.display = 'none';
        placeholder.style.display = 'block';
        placeholder.innerText = "Loading data...";
        
        img.src = url;
        img.onload = () => {
            placeholder.style.display = 'none';
            img.style.display = 'block';
        };
        img.onerror = () => {
            placeholder.innerText = "No data for this region.";
        };
    }

    function handleLatestShipPosition(data) {
        const info = document.getElementById("ship-info");
        try {
            const row = data.table.rows[0];
            const time = row[0];
            const lat = Number(row[1]);
            const lon = Number(row[2]);
            const lonForMap = lon > 180 ? lon - 360 : lon;

            const nLat = (lat + 2.5).toFixed(2);
            const sLat = (lat - 2.5).toFixed(2);
            const wLon = (lonForMap - 2.5).toFixed(2);
            const eLon = (lonForMap + 2.5).toFixed(2);
            const coords = `[(${nLat}):(${sLat})][(${wLon}):(${eLon})]`;

            const timeStr = new Date(time).toLocaleString(undefined, { timeZoneName: 'short' });
            info.innerHTML = `Vessel: <b>${currentShipName}</b> | Latest Position: <span class="coords-text">${lat.toFixed(2)}, ${lon.toFixed(2)}</span> | Observed: ${timeStr}`;

            // Map Updates
            updateMap('chla-d', `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaDaily.png?chlor_a[(last)][(0.0)]${coords}&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`);
            updateMap('chla-w', `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly.png?chlor_a[(last)][(0.0)]${coords}&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`);
            updateMap('sst', `https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW.png?CRW_SST[(last)]${coords}&.vars=longitude|latitude|CRW_SST&.colorBar=|||10|22|`);
            updateMap('sst-anom', `https://coastwatch.pfeg.noaa.gov/erddap/griddap/NOAA_DHW.png?CRW_SSTANOMALY[(last)]${coords}&.vars=longitude|latitude|CRW_SSTANOMALY&.colorBar=BlueWhiteRed|||-2|2|`);
            updateMap('wind', `https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQCwindproducts1day.png?wind_speed[(last)][(10.0)]${coords}`);
            updateMap('ssh', `https://coastwatch.noaa.gov/erddap/griddap/noaacweddymesiplusdaily.png?ssh[(last)]${coords}&.vars=longitude|latitude|ssh&.colorBar=|||-0.5|0.5|`);

        } catch (e) {
            info.innerHTML = `Vessel: <b>${currentShipName}</b><br><small>(Error processing coordinates)</small>`;
        }
    }

    function loadShipMap() {
        const selector = document.getElementById("vessel-selector");
        const shipId = selector.value;
        currentShipName = selector.options[selector.selectedIndex].text.replace(/\s*\(.*?\)\s*/g, "").trim();

        const date = new Date();
        date.setDate(date.getDate() - 10);
        const trackUrl = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.png?longitude%2Clatitude%2Ctime&time%3E=${date.toISOString().split("T")[0]}&.draw=markers&.marker=10%7C5&.color=0x000000&.colorBar=%7C%7C%7C%7C%7C&.bgColor=0xffccccff`;
        
        updateMap('track-map', trackUrl);

        const oldScript = document.getElementById("jsonp-script");
        if (oldScript) oldScript.remove();
        const script = document.createElement("script");
        script.id = "jsonp-script";
        script.src = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.json?time,latitude,longitude&orderByMax("time")&.jsonp=handleLatestShipPosition`;
        document.body.appendChild(script);
    }

    window.onload = loadShipMap;
</script>
</body>
</html>
