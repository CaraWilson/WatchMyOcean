<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOAA Ship Track Mapper</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f4f4f9; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px; cursor: pointer; }
        .map-box { width: 100%; min-height: 500px; border: 2px solid #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fafafa; }
        img { max-width: 100%; height: auto; display: block; border-radius: 4px; }
        .info { margin-top: 15px; color: #333; font-weight: 500; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>Vessel History (Last 10 Days)</h2>
    
    <select id="vessel-selector" onchange="loadShipMap()">
        <option value="fsuNoaaShipWTEPnrt">Oscar Dyson</option>
        <option value="fsuNoaaShipWTEDnrt">Bell M. Shimada</option>
        <option value="fsuNoaaShipWTEFnrt">Rainier</option>
        <option value="fsuNoaaShipWTEEnrt">Elton Sette</option>
        <option value="fsuNoaaShipWTERnrt">Nancy Foster</option>
        <option value="fsuNoaaShipWTDLnrt">Pisces</option>
    </select>

    <div class="map-box">
        <div id="placeholder-text">Please select a vessel to generate the track map.</div>
        <img id="dynamic-map" src="" style="display:none;">
    </div>
    
    <div id="debug-info" class="info"></div>
</div>

<script>
    function loadShipMap() {
        const shipId = document.getElementById('vessel-selector').value;
        const mapImg = document.getElementById('dynamic-map');
        const placeholder = document.getElementById('placeholder-text');
        const debug = document.getElementById('debug-info');

        if (!shipId) {
            mapImg.style.display = 'none';
            placeholder.style.display = 'block';
            debug.innerText = "";
            return;
        }

        // 1. Show loading state
        placeholder.innerText = "Fetching vessel data and generating map...";
        mapImg.style.display = 'none';

        // 2. Request the latest data (Ship Name/Site, Lat, Lon, Time) via JSONP to avoid CORS
        const dataUrl = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.jsonp?site%2Clatitude%2Clongitude%2Ctime&orderByMax(%22time%22)&.jsonp=handleShipData`;

        // Clean up any old script tags
        const oldScript = document.getElementById('erddap-data-script');
        if (oldScript) oldScript.remove();

        const script = document.createElement('script');
        script.id = 'erddap-data-script';
        script.src = dataUrl;
        document.body.appendChild(script);

        // 3. Callback function to process the data
        window.handleShipData = function(data) {
            try {
                const row = data.table.rows[0];
                const shipName = row[0];
                const lat = row[1].toFixed(4);
                const lon = row[2].toFixed(4);
                const time = new Date(row[3]).toLocaleString();

                // Generate the Map URL (10 day window)
                const date = new Date();
                date.setDate(date.getDate() - 10);
                const dateString = date.toISOString().split('T')[0];

                const mapUrl = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.png?longitude%2Clatitude%2Ctime&time%3E=${dateString}&.draw=markers&.marker=10%7C5&.color=0x000000&.colorBar=%7C%7C%7C%7C%7C&.bgColor=0xffccccff`;

                mapImg.src = mapUrl;
                
                mapImg.onload = () => {
                    placeholder.style.display = 'none';
                    mapImg.style.display = 'block';
                    // Update info text at bottom
                    debug.innerHTML = `Ship: <b>${shipName}</b> | Position: <b>${lat}, ${lon}</b> <br> Last Updated: <b>${time}</b>`;
                };
            } catch (err) {
                placeholder.innerText = "Error: Could not retrieve latest position data.";
            }
        };

        mapImg.onerror = () => {
            placeholder.style.display = 'block';
            placeholder.innerText = "Error: Map could not be generated.";
            mapImg.style.display = 'none';
        };
    }

    // Initialize the Dyson on load
    window.onload = loadShipMap;
</script>

</body>
</html>
