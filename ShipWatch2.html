<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOAA Ship Watch - Dynamic 10-Day Window</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f4f4f9; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 2px solid #003366; margin-bottom: 20px; cursor: pointer; }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .map-box { min-height: 450px; border: 2px solid #eee; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; position: relative; }
        h3 { color: #003366; margin-bottom: 10px; font-size: 1rem; text-align: center; }
        img { max-width: 100%; height: auto; display: block; border-radius: 4px; }
        .info { margin-top: 15px; color: #333; text-align: center; line-height: 1.6; font-size: 1.1rem; }
        .coords-text { font-weight: bold; color: #003366; }
        .placeholder { color: #666; padding: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>Vessel History & Environmental Context</h2>
    <select id="vessel-selector" onchange="loadShipMap()">
        <option value="fsuNoaaShipWTEPnrt">Oscar Dyson (Gulf of Alaska)</option>
        <option value="fsuNoaaShipWTEDnrt">Bell M. Shimada (West Coast)</option>
        <option value="fsuNoaaShipWTEFnrt">Rainier (West Coast)</option>
        <option value="fsuNoaaShipWTEEnrt">Elton Sette (Hawaii)</option>
        <option value="fsuNoaaShipWTERnrt">Nancy Foster (Atlantic)</option>
        <option value="fsuNoaaShipWTDLnrt">Pisces (Gulf of Mexico)</option>
    </select>

    <div class="map-grid">
        <div class="map-box">
            <h3>Last 10 Days of Recorded Track</h3>
            <div id="track-placeholder" class="placeholder">Finding most recent data...</div>
            <img id="dynamic-map" src="" style="display:none;">
        </div>
        <div class="map-box">
            <h3>Weekly Chlorophyll (Latest)</h3>
            <div id="chlor-placeholder" class="placeholder">Waiting for coordinates...</div>
            <img id="chlor-map" src="" style="display:none;">
        </div>
    </div>
    <div id="ship-info" class="info"></div>
</div>

<script>
    let currentShipName = "";

    // This handles the data and the maps once we have the latest timestamp and position
    window.handleShipData = function(data) {
        const info = document.getElementById("ship-info");
        const mapImg = document.getElementById("dynamic-map");
        const trackPlaceholder = document.getElementById("track-placeholder");
        const shipId = document.getElementById("vessel-selector").value;

        try {
            const row = data.table.rows[0];
            const maxTimeStr = row[0]; // e.g., "2024-03-10T12:00:00Z"
            const lat = Number(row[1]);
            const lon = Number(row[2]);
            const lonForMap = lon > 180 ? lon - 360 : lon;

            // 1. Calculate 10 days BEFORE the max date in the dataset
            const maxDate = new Date(maxTimeStr);
            const startDate = new Date(maxDate);
            startDate.setDate(startDate.getDate() - 10);
            const startDateString = startDate.toISOString().split("T")[0];

            // 2. Update the Track Map using the dynamic range
            mapImg.src = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.png?longitude%2Clatitude%2Ctime&time%3E=${startDateString}&.draw=markers&.marker=10%7C5&.color=0x000000&.colorBar=%7C%7C%7C%7C%7C&.bgColor=0xffccccff`;
            
            mapImg.onload = () => {
                trackPlaceholder.style.display = "none";
                mapImg.style.display = "block";
            };

            // 3. Update Text Info
            info.innerHTML = `Vessel: <b>${currentShipName}</b><br>` +
                             `Latest Report: <span class="coords-text">${lat.toFixed(2)}, ${lon.toFixed(2)}</span><br>` +
                             `<small>Observed: ${maxDate.toLocaleString()} | Window: ${startDateString} to ${maxTimeStr.split('T')[0]}</small>`;

            // 4. Trigger Chlorophyll Map (5x5 Box)
            updateChlorophyll(lat, lonForMap);

        } catch (e) {
            info.innerHTML = `Error: Dataset for ${currentShipName} might be empty or unavailable.`;
        }
    };

    function updateChlorophyll(lat, lon) {
        const chlorImg = document.getElementById("chlor-map");
        const chlorPlaceholder = document.getElementById("chlor-placeholder");
        
        const nLat = (lat + 2.5).toFixed(2);
        const sLat = (lat - 2.5).toFixed(2);
        const wLon = (lon - 2.5).toFixed(2);
        const eLon = (lon + 2.5).toFixed(2);

        const chlorUrl = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/nesdisVHNnoaa20chlaWeekly.png?chlor_a[(last)][(0.0)][(${nLat}):(${sLat})][(${wLon}):(${eLon})]&.vars=longitude|latitude|chlor_a&.colorBar=Rainbow2|||.03|5|`;
        
        chlorImg.src = chlorUrl;
        chlorImg.onload = () => {
            chlorPlaceholder.style.display = "none";
            chlorImg.style.display = "block";
        };
    }

    function loadShipMap() {
        const selector = document.getElementById("vessel-selector");
        const shipId = selector.value;
        currentShipName = selector.options[selector.selectedIndex].text.replace(/\s*\(.*?\)\s*/g, "").trim();

        // UI Reset
        document.getElementById("dynamic-map").style.display = "none";
        document.getElementById("track-placeholder").style.display = "block";
        document.getElementById("track-placeholder").innerText = "Querying dataset metadata...";

        // JSONP call to find the MAX(time) and latest coordinates
        const oldScript = document.getElementById("jsonp-script");
        if (oldScript) oldScript.remove();
        const script = document.createElement("script");
        script.id = "jsonp-script";
        script.src = `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${shipId}.json?time,latitude,longitude&orderByMax("time")&.jsonp=handleShipData`;
        document.body.appendChild(script);
    }

    window.onload = loadShipMap;
</script>
</body>
</html>
